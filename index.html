<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Property Management SaaS</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Total Branding Hider - Professional Clean Version */
    .goog-te-banner-frame.skiptranslate,
    .goog-te-banner-frame,
    #goog-gt-tt,
    .goog-te-balloon-frame,
    .goog-te-gadget-icon,
    .goog-logo-link,
    .goog-te-spinner-pos,
    .goog-te-spinner,
    .goog-te-spinner *,
    .goog-te-gadget img,
    .goog-te-menu-value img,
    iframe.skiptranslate {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
      width: 0 !important;
      height: 0 !important;
    }

    body {
      top: 0px !important;
    }

    .goog-te-gadget {
      color: transparent !important;
      font-size: 0 !important;
    }

    .goog-te-gadget span {
      display: none !important;
    }
  </style>
  <script type="text/javascript">
    window.googleTranslateElementInit = function () {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,fr',
        autoDisplay: false
      }, 'google_translate_master_container');
    };
  </script>
  <script type="text/javascript"
    src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>

<body>
  <div id="root"></div>
  <div id="google_translate_master_container" style="display:none !important"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
